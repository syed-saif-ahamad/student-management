{% extends 'base.html' %}

{% block title %}Delete Student - SMS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-body text-center p-4">
                    <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                    <h4 class="mt-3">Delete Student?</h4>
                    <p>Are you sure you want to delete <strong>{{ student.name }}</strong> ({{ student.roll_no }})?</p>
                    <form method="post" class="d-flex justify-content-center gap-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'students:list' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
