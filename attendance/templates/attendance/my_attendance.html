{% extends 'base.html' %}

{% block title %}My Attendance - SMS{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h2 class="mb-4"><i class="bi bi-calendar-check me-2"></i>My Attendance</h2>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stat-card bg-success text-white shadow-sm">
                <div class="card-body">
                    <h6 class="text-uppercase opacity-75">Attendance Percentage</h6>
                    <h2 class="mb-0">{{ percentage }}%</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>Date</th><th>Status</th></tr>
                </thead>
                <tbody>
                    {% for record in records %}
                    <tr>
                        <td>{{ record.date }}</td>
                        <td>
                            <span class="badge {% if record.status == 'Present' %}bg-success{% elif record.status == 'Late' %}bg-warning text-dark{% else %}bg-danger{% endif %}">
                                {{ record.status }}
                            </span>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2" class="text-center text-muted py-4">No attendance records yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
