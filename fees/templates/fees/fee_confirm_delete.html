{% extends 'base.html' %}
{% block title %}Confirm Delete - SMS{% endblock %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-danger">
        <div class="card-body text-center p-4">
          <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
          <h4 class="mt-3">Confirm Delete</h4>
          <p class="text-muted">Are you sure you want to delete <strong>{{ obj }}</strong>?<br>This action cannot be undone.</p>
          <form method="post" class="d-flex justify-content-center gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            {% if type == 'structure' %}
            <a href="{% url 'fees:structure_list' %}" class="btn btn-secondary">Cancel</a>
            {% else %}
            <a href="{% url 'fees:list' %}" class="btn btn-secondary">Cancel</a>
            {% endif %}
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
